<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter CTOR Dashboard</title>
  <style>
    :root { --ok: #0a7a3e; --warn: #c45c00; --bg: #f7f7f7; --card: #fff; --text: #111; --muted: #666; }
    body { font-family: Pretendard, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    .wrap { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem; }
    h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
    .meta { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .card { background: var(--card); border: 1px solid #e8e8e8; border-radius: 8px; padding: 1rem; }
    .card label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .card strong { display: block; font-size: 1.25rem; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; font-size: 0.875rem; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #fafafa; font-weight: 600; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .badge { padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .badge.ok { background: #e6f4ea; color: var(--ok); }
    .badge.warn { background: #fff3e0; color: var(--warn); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Newsletter CTOR 실측</h1>
    <p class="meta">{{SUMMARY}} · 갱신 {{UPDATED}}</p>
    <div class="cards">
      <div class="card"><label>CTOR 목표</label><strong>{{CTOR_TARGET}}</strong></div>
      <div class="card"><label>Open (방향성)</label><strong>{{OPEN_TARGET}}</strong></div>
    </div>
    <table>
      <thead>
        <tr>
          <th>발송일</th><th>제목</th><th>Delivered</th><th>Opens</th><th>Clicks</th><th>Open%</th><th>CTOR</th>
        </tr>
      </thead>
      <tbody>
        {{ROWS}}
      </tbody>
    </table>
  </div>
</body>
</html>
