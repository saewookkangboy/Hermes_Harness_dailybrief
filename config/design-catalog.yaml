# getdesign.md (https://getdesign.md/) 기반 디자인 프리셋
# 강의 슬라이드·HTML deck에 적용. Content Studio 기본 + 외부 브랜드 참조.

presets:
  content-studio:
    source: local
    ref: Getdesign.md
    description: "실무형·문서형 — 마케팅·교육 콘텐츠 스튜디오 기본"
    colors:
      primary: "#111111"
      secondary: "#666666"
      tertiary: "#FFE500"
      accent: "#E60012"
      neutral: "#F7F7F7"
      surface: "#FFFFFF"
      border: "#D9D9D9"
    typography:
      heading: Pretendard
      body: Pretendard
    layout:
      cover: "yellow-left-title-bar"
      body: "gray-band-proof-object"

  linear:
    source: getdesign.md
    ref: Linear
    description: "Ultra-minimal, precise, purple accent — PM·개발자 대상"
    colors:
      primary: "#F4F5F8"
      secondary: "#8A8F98"
      tertiary: "#5E6AD2"
      accent: "#5E6AD2"
      neutral: "#1A1B23"
      surface: "#0F1011"
      border: "#2A2B35"
    typography:
      heading: "Inter"
      body: "Inter"
    layout:
      cover: "dark-minimal-title"
      body: "dark-proof-object"

  notion:
    source: getdesign.md
    ref: Notion
    description: "Warm minimalism, serif headings — 지식·워크스페이스"
    colors:
      primary: "#37352F"
      secondary: "#787774"
      tertiary: "#F7F6F3"
      accent: "#2383E2"
      neutral: "#F7F6F3"
      surface: "#FFFFFF"
      border: "#E9E9E7"
    typography:
      heading: "Noto Serif KR"
      body: Pretendard
    layout:
      cover: "warm-serif-title"
      body: "soft-callout"

  claude:
    source: getdesign.md
    ref: Claude
    description: "Warm terracotta, clean editorial — AI·에이전트 주제"
    colors:
      primary: "#1A1614"
      secondary: "#6B6560"
      tertiary: "#D97757"
      accent: "#D97757"
      neutral: "#FAF9F7"
      surface: "#FFFFFF"
      border: "#E8E4DF"
    typography:
      heading: "Source Serif 4"
      body: "Source Sans 3"
    layout:
      cover: "terracotta-editorial"
      body: "editorial-proof"

  stripe:
    source: getdesign.md
    ref: Stripe
    description: "Purple gradients, weight-300 elegance — fintech·SaaS"
    colors:
      primary: "#0A2540"
      secondary: "#425466"
      tertiary: "#635BFF"
      accent: "#635BFF"
      neutral: "#F6F9FC"
      surface: "#FFFFFF"
      border: "#E3E8EE"
    typography:
      heading: "Inter"
      body: "Inter"
    layout:
      cover: "gradient-purple"
      body: "clean-data"

  vercel:
    source: getdesign.md
    ref: Vercel
    description: "Black and white precision, Geist — 개발·배포 주제"
    colors:
      primary: "#000000"
      secondary: "#666666"
      tertiary: "#0070F3"
      accent: "#0070F3"
      neutral: "#FAFAFA"
      surface: "#FFFFFF"
      border: "#EAEAEA"
    typography:
      heading: "Geist"
      body: "Geist"
    layout:
      cover: "mono-precision"
      body: "code-forward"

selection_rules:
  - keywords: [AI, agent, Claude, Anthropic, LLM]
    preset: claude
  - keywords: [개발, 코드, Cursor, 배포, API]
    preset: vercel
  - keywords: [SaaS, 결제, fintech, B2B]
    preset: stripe
  - keywords: [PM, 프로젝트, Linear, 애자일]
    preset: linear
  - keywords: [워크스페이스, 지식, 문서, Notion]
    preset: notion

default_preset: content-studio
